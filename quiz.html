<!DOCTYPE html>
<html>

<head>
    <title>Quiz</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="quiz-card">
            <div class="header">
                <h5>Quiz</h5>
            </div>

            <div class="position-relative mb-3 mx-auto" style="width: 70px; height: 70px;">
                <div id="circleTimer" class="circle-timer d-flex justify-content-center align-items-center">
                    <span id="timerText">30</span>
                </div>
            </div>
            <div class="progress mb-3" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                id="progressContainer">
                

                <div class="progress-bar text-bg-success" id="progressBar">
                    0%
                </div>
            </div>

            <div class="question-box">
                <p id="question"></p>
            </div>

            <div id="options" class="options"></div>

            <button class="btn btn-primary w-100 mt-3" onclick="nextQuestion()">Next</button>
            <button class="btn btn-primary w-100 mt-3" onclick="prevQuestion()">Prev</button>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
